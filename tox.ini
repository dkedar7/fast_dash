[tox]
isolated_build = true
envlist = py311, py312, py313, py314, lint, format

[gh-actions]
python =
    3.14: py314
    3.13: py313
    3.12: py312
    3.11: py311

[testenv:lint]
allowlist_externals =
    isort
    black
    flake8
    poetry
    mkdocs
    twine
extras =
    test
    doc
    dev
commands =
    isort fast_dash
    black fast_dash tests
    flake8 fast_dash tests
    poetry build
    mkdocs build
    twine check dist/*

[testenv]
allowlist_externals =
    pytest
    pip
extras =
    test
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pip install "dash[testing]>=3.0.0"
    pip install --upgrade "selenium>=4.15"
    pytest -s --cov=fast_dash --cov-append --cov-report=xml --cov-report term-missing tests

